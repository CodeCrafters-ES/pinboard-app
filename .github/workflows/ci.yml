name: CI — Pull Request

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  markdown-lint:
    name: Markdown Lint (ADRs)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:md

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: Tests (Jest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test -- --ci --passWithNoTests --testPathIgnorePatterns="/node_modules/" "/\.expo/" "/__tests__/integration/"

  rls-tests:
    name: RLS Tests (Supabase)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - uses: supabase/setup-cli@v1
        with:
          version: 2.108.0
      - run: supabase start
      - run: pnpm supabase:test:rls
      - if: always()
        run: supabase stop

  integration-test:
    name: Integration Tests (Supabase)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - uses: supabase/setup-cli@v1
        with:
          version: 2.108.0
      - run: supabase start
      # `supabase start` no sirve las Edge Functions: hay que arrancarlas aparte
      # para que el test de integración de track-engagement pueda alcanzarlas.
      # Se sirve en background dentro del mismo step (así el proceso sigue vivo
      # durante los tests) y se espera a que responda antes de lanzar Jest.
      - name: Serve edge functions and run integration tests
        run: |
          supabase functions serve track-engagement --no-verify-jwt > /tmp/functions.log 2>&1 &
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST http://127.0.0.1:54321/functions/v1/track-engagement \
              -H "Content-Type: application/json" -d '[]' || true)
            if [ "$code" != "503" ] && [ "$code" != "000" ]; then
              echo "edge functions ready (HTTP $code)"; break
            fi
            echo "waiting for edge functions... (HTTP $code)"; sleep 2
          done
          pnpm test -- --ci --testPathPattern="__tests__/integration/"
      - if: always()
        run: cat /tmp/functions.log || true
      - if: always()
        run: supabase stop
