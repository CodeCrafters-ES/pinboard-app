name: CI — Pull Request

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  markdown-lint:
    name: Markdown Lint (ADRs)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:md

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: Tests (Jest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test -- --ci --passWithNoTests --testPathIgnorePatterns="/node_modules/" "/\.expo/" "/__tests__/integration/"

  rls-tests:
    name: RLS Tests (Supabase)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - uses: supabase/setup-cli@v1
        with:
          version: 2.108.0
      - run: supabase start
      - run: pnpm supabase:test:rls
      - if: always()
        run: supabase stop

  integration-test:
    name: Integration Tests (Supabase)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - uses: supabase/setup-cli@v1
        with:
          version: 2.108.0
      - run: supabase start
      # `supabase start` no sirve las Edge Functions: hay que arrancarlas aparte
      # para que el test de integración de track-engagement pueda alcanzarlas.
      # Se sirve en background dentro del mismo step (así el proceso sigue vivo
      # durante los tests) y se CALIENTA antes de lanzar Jest.
      #
      # El calentamiento manda un JWT (la anon key) en `Authorization`, y eso importa:
      # sin esa cabecera la función corta en su primer check ("Missing Authorization
      # header") sin llegar a crear el cliente Supabase, así que el probe daría "listo"
      # sin haber pagado el arranque en frío. Con el Bearer, la función recorre
      # createClient + getUser y responde 401 "Unauthorized": eso prueba que el camino
      # caro ya está caliente, y el cold start se paga aquí y no en un timeout de Jest.
      - name: Serve edge functions and run integration tests
        run: |
          supabase functions serve track-engagement --no-verify-jwt > /tmp/functions.log 2>&1 &

          # `status -o json` es estable entre versiones de la CLI; el parseo de
          # `-o env` no lo era y dejaba ANON_KEY vacío en silencio.
          ANON_KEY=$(supabase status -o json \
            | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>process.stdout.write(JSON.parse(s).ANON_KEY))")
          if [ -z "$ANON_KEY" ]; then
            echo "::error::no se pudo leer ANON_KEY de 'supabase status -o json'"; exit 1
          fi

          for i in $(seq 1 30); do
            body=$(curl -s -m 30 -X POST http://127.0.0.1:54321/functions/v1/track-engagement \
              -H "apikey: $ANON_KEY" -H "Authorization: Bearer $ANON_KEY" \
              -H "Content-Type: application/json" -d '[]' || true)
            if echo "$body" | grep -q 'Unauthorized'; then
              echo "edge function warm (createClient + getUser exercised)"; break
            fi
            echo "warming edge function... ($body)"; sleep 2
          done

          pnpm test -- --ci --testPathPattern="__tests__/integration/"
      - if: always()
        run: cat /tmp/functions.log || true
      - if: always()
        run: supabase stop
